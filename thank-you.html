<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Agendamento Confirmado | Mangop Digital</title>
  
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;700;800&display=swap" rel="stylesheet">

  <script src="https://cdn.tailwindcss.com"></script>

  <script>
    tailwind.config = {
      theme: {
        extend: {
          colors: {
            orange: { 500: '#fe6e00' }
          },
          fontFamily: { sans: ['Inter', 'sans-serif'] }
        }
      }
    }
  </script>

  <style type="text/css">
    body { background-color: #0f172a; color: white; }
    .glass {
      background: rgba(255, 255, 255, 0.05);
      backdrop-filter: blur(16px);
      border: 1px solid rgba(255, 255, 255, 0.1);
    }
  </style>
</head>
<body class="min-h-screen flex items-center justify-center p-6 text-center">
  
  <main class="glass max-w-lg w-full rounded-3xl p-10 space-y-6">
    <div class="flex justify-center">
      <div class="w-20 h-20 bg-green-500/20 text-green-400 rounded-full flex items-center justify-center text-4xl">
        ✓
      </div>
    </div>
    
    <h1 class="text-3xl font-extrabold">Tudo pronto!</h1>
    
    <p class="text-slate-300 leading-relaxed">
      Seu agendamento foi recebido com sucesso. Verifique seu e-mail (e a caixa de spam) para os detalhes do convite no Google Meet.
    </p>

    <div class="pt-4">
      <a href="index.html" class="inline-block px-8 py-3 bg-white/10 hover:bg-white/20 border border-white/10 rounded-xl transition-all font-medium">
        Voltar para o site
      </a>
    </div>

    <p class="text-xs text-slate-500">Você será redirecionado em alguns segundos...</p>
  </main>

  <script>
    // Redireciona para a home após 10 segundos
    setTimeout(() => {
      window.location.href = "index.html";
    }, 10000);
  </script>
</body>
</html>
